<header class="header">
  <div class="header-inner">

    <!-- Breadcrumb -->
    <div class="breadcrumb">
      @for (item of breadcrumbs; track item.label; let last = $last) {
        @if (!last) {
          <a [routerLink]="item.route" class="breadcrumb-link">{{ item.label }}</a>
          <span class="breadcrumb-sep">/</span>
        } @else {
          <span class="breadcrumb-current">{{ item.label }}</span>
        }
      }
    </div>

    <!-- Right -->
    <div class="header-right">

      <!-- Notifications
      <button class="notif-btn">
        <span class="material-symbols-outlined notif-icon">notifications</span>
        <span class="notif-dot"></span>
      </button> -->

      <!-- User -->
      @if (currentUser) {
        <div class="user-wrapper" (clickOutside)="closeUserMenu()">
          <button class="user-info" (click)="toggleUserMenu()">
            <div class="user-text">
              <p class="user-name">{{ fullName }}</p>
              <p class="user-role">{{ userRole }}</p>
            </div>
            <div class="user-avatar">{{ userInitials }}</div>
            <span class="material-symbols-outlined user-chevron">
              <!-- {{ showUserMenu ? 'expand_less' : 'expand_more' }} -->
            </span>
          </button>

          <!-- Dropdown -->
          @if (showUserMenu) {
            <div class="user-dropdown">
              <div class="dropdown-user-info">
                <div class="dropdown-avatar">{{ userInitials }}</div>
                <div>
                  <p class="dropdown-name">{{ fullName }}</p>
                  <p class="dropdown-role">{{ userRole }}</p>
                </div>
              </div>
              <div class="dropdown-divider"></div>
              <button class="dropdown-item dropdown-item--logout" (click)="onLogout()">
                <span class="material-symbols-outlined">logout</span>
                Se déconnecter
              </button>
            </div>
          }
        </div>
      }

    </div>
  </div>
</header>
