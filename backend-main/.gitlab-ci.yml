variables:
  NEXUS_REGISTRY: "nexus.retd.edf.fr:5141"
  APP_NAME: "biodiv-registry/backend"
  NEXUS_IMAGE: "${NEXUS_REGISTRY}/${APP_NAME}"
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"

stages:
  - test
  - sonar
  - build
  - deploy

# ─── TESTS PYTEST ────────────────────────────────────────
test:
  stage: test
  image: nexus.retd.edf.fr/python:3.13-slim
  services:
    - name: nexus.retd.edf.fr/postgres:16-alpine
      alias: postgres
  variables:
    DJANGO_SECRET_KEY: "ci-test-secret-key"
    DJANGO_DEBUG: "1"
    DJANGO_ALLOWED_HOSTS: "localhost"
    DB_HOST: "postgres"
    DB_NAME: "test_db"
    DB_USER: "test_user"
    DB_PASSWORD: "test_password"
    DB_PORT: "5432"
    POSTGRES_DB: "test_db"
    POSTGRES_USER: "test_user"
    POSTGRES_PASSWORD: "test_password"
  before_script:
    - pip install --no-cache-dir
        --index-url https://nexus.retd.edf.fr/repository/pypi-proxy/simple/
        --trusted-host nexus.retd.edf.fr
        -r requirements.txt
    - pip install --no-cache-dir
        --index-url https://nexus.retd.edf.fr/repository/pypi-proxy/simple/
        --trusted-host nexus.retd.edf.fr
        pytest pytest-django pytest-cov
  script:
    - pytest --cov=. --cov-report=xml --cov-report=term -v
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
    expire_in: 7 days
  coverage: '/TOTAL.*\s+(\d+%)$/'
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == 'main'
    - if: $CI_COMMIT_BRANCH == 'develop'
    - if: $CI_COMMIT_TAG

# ─── SONAR ───────────────────────────────────────────────
sonar:
  stage: sonar
  image:
    name: nexus.retd.edf.fr/sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
    docker:
      user: root
  needs:
    - job: test
      artifacts: true
      optional: true
  cache:
    policy: pull-push
    key: "sonar-cache-$CI_COMMIT_REF_SLUG"
    paths:
      - "${SONAR_USER_HOME}/cache"
  before_script:
    - ls -la coverage.xml || echo "coverage.xml non trouvé"
  script:
    - 2>&1 openssl s_client -showcerts -servername sonar-ee.retd.edf.fr -connect sonar-ee.retd.edf.fr:443 </dev/null|grep -Pzo "[-]+BEGIN CERTIFICATE(.+\n)+.*END CERTIFICATE[-]+\n" > /tmp/sonar-eeretdedffr.crt
    - keytool -import -alias sonar-edf-new -keystore /usr/lib/jvm/java-21-amazon-corretto.x86_64/lib/security/cacerts -file /tmp/sonar-eeretdedffr.crt -storepass "changeit" -noprompt
    - sonar-scanner
      -Dsonar.host.url="${SONAR_HOST_URL}"
      -Dsonar.token="${SONAR_TOKEN_BACK}"

  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == 'main'
    - if: $CI_COMMIT_BRANCH == 'develop'
    - if: $CI_COMMIT_TAG

# ─── BUILD IMAGE ─────────────────────────────────────────
build:
  stage: build
  image: nexus.retd.edf.fr/docker:26
  services:
    - nexus.retd.edf.fr/docker:26-dind
  before_script:
    - docker login  $NEXUS_REGISTRY -u $NEXUS_USERNAME -p $NEXUS_PASSWORD
  script:
    - docker build
        --build-arg PIP_INDEX_URL=https://nexus.retd.edf.fr/repository/pypi-proxy/simple/
        --build-arg PIP_TRUSTED_HOST=nexus.retd.edf.fr
        -t $NEXUS_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker push $NEXUS_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker tag $NEXUS_IMAGE:$CI_COMMIT_SHORT_SHA $NEXUS_IMAGE:latest
    - docker push $NEXUS_IMAGE:latest
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag $NEXUS_IMAGE:$CI_COMMIT_SHORT_SHA $NEXUS_IMAGE:$CI_COMMIT_TAG
        docker push $NEXUS_IMAGE:$CI_COMMIT_TAG
        docker tag $NEXUS_IMAGE:$CI_COMMIT_SHORT_SHA $NEXUS_IMAGE:latest
        docker push $NEXUS_IMAGE:latest
      fi
  rules:
      - if: $CI_COMMIT_BRANCH == 'main'
        when: on_success
      - if: $CI_COMMIT_TAG
        when: on_success
      - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
        when: manual

# ─── DEPLOY ──────────────────────────────────────────────
deploy:
  stage: deploy
  image: nexus.retd.edf.fr/alpine:latest
  before_script:
    - echo https://linux.pleiade.edf.fr/alpine/v3.23/main/ > /etc/apk/repositories
    - echo https://linux.pleiade.edf.fr/alpine/v3.23/community/ >> /etc/apk/repositories
    - apk update --no-check-certificate  --allow-untrusted
    - apk add --no-check-certificate  openssh-client
    - eval $(ssh-agent -s)
    - chmod 400 "$SSH_PRIVATE_KEY"
    - ssh-add "$SSH_PRIVATE_KEY"
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $VM_HOST >> ~/.ssh/known_hosts
  script:
    - |
      ssh $VM_USER@$VM_HOST "
        docker login $NEXUS_REGISTRY -u $NEXUS_USERNAME -p $NEXUS_PASSWORD &&
        docker pull $NEXUS_IMAGE:${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA} &&
        cd /opt/biodiv-deploy &&
        BACK_TAG=${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA} \
        docker compose -p biodiv-prod -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps backend
      "
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == 'main'
    - if: $CI_COMMIT_BRANCH == 'develop'
    - if: $CI_COMMIT_TAG
  # only:
  #   - main
  #   - tags
  when: manual